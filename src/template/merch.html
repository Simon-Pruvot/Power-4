<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tektur:wght@400..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les skins disponibles</title>
    <link rel="stylesheet" href="./CSS/base.css">
    <link rel="stylesheet" href="./CSS/merch.css">
</head>
<body>
    {{template "header" .}}


    <div class="gallery-skin"> 
    {{range .}}
    <div class="item">
        <img src="../images/{{.}}" class="skin">  
        <form method="POST" action="/merch"> 
            <input type="hidden" name="pion1" value="{{.}}">
            <input type="submit" class="bouton-skin" value="Joueur 1">
        </form>
        <form method="POST" action="/merch"> 
            <input type="hidden" name="pion2" value="{{.}}">
            <input type="submit" class="bouton-skin" value="Joueur 2">
        </form>
    </div>
    {{end}}
    </div>
    <div class="camera">
        <a href="/camera">
        🎥 Take a New Photo
        </a>
    </div>
</body>
</html>
