{{template "header.html"}}
<body style="font-family: sans-serif; text-align:center; background:#32346F; color:white;">
  <h1>Take Your Custom Skin</h1>
  <p>Allow camera access, align your face, then click capture.</p>

  <video id="video" width="500" height="500" autoplay playsinline
         style="border:4px solid #FFED19; border-radius:10px;"></video>

  <canvas id="canvas" width="500" height="500"
          style="display:none; border:4px solid #4C63C6; margin-top:20px; border-radius:10px;"></canvas>

  <br><br>


  <button id="capture"
          style="background:#F5503A; color:white; padding:10px 20px; border:none; border-radius:8px; font-size:16px;">
    📸 Capture Photo
  </button>

  
  <div id="action-buttons" style="display:none; margin-top:20px;">
    <button id="retake"
            style="background:#4C63C6; color:white; padding:10px 20px; border:none; border-radius:8px; font-size:16px; margin-right:10px;">
      🔄 Retake
    </button>
    <button id="save"
            style="background:#2ECC71; color:white; padding:10px 20px; border:none; border-radius:8px; font-size:16px;">
      💾 Save
    </button>
  </div>

  <p id="status" style="margin-top:20px; font-weight:bold;"></p>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture');
    const actionBtns = document.getElementById('action-buttons');
    const retakeBtn = document.getElementById('retake');
    const saveBtn = document.getElementById('save');
    const statusEl = document.getElementById('status');
    let capturedBlob = null;

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => { video.srcObject = stream; })
      .catch(err => {
        statusEl.textContent = 'Cannot access camera: ' + err.message;
      });

    captureBtn.addEventListener('click', () => {
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, 500, 500);
      canvas.style.display = 'block';
      video.style.display = 'none';
      captureBtn.style.display = 'none';
      actionBtns.style.display = 'block';
      statusEl.textContent = 'Preview your photo. Save or retake?';

      canvas.toBlob((blob) => {
        capturedBlob = blob;
      }, 'image/jpeg', 0.9);
    });

    // Retake button
    retakeBtn.addEventListener('click', () => {
      canvas.style.display = 'none';
      video.style.display = 'block';
      captureBtn.style.display = 'inline-block';
      actionBtns.style.display = 'none';
      statusEl.textContent = 'Align your face and capture again.';
    });

    // Save butto
    saveBtn.addEventListener('click', async () => {
      if (!capturedBlob) return;
      statusEl.textContent = 'Uploading...';

      const form = new FormData();
      form.append('photo', capturedBlob, 'photo.jpg');

      try {
        const res = await fetch('/uploadphoto', { method: 'POST', body: form });
        if (res.ok) {
          statusEl.textContent = 'Photo saved successfully!';
          setTimeout(() => { window.location.href = '/merch'; }, 1000);
        } else {
          const text = await res.text();
          statusEl.textContent = 'Upload failed: ' + text;
        }
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
